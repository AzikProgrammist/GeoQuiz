<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GeoQuiz 🌍</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0094ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GeoQuiz" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- SEO -->
  <meta name="description" content="Davlatlar, poytaxtlar, bayroqlar va xaritalar bo'yicha interaktiv geografiya testi" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080c14; }
    #root { height: 100%; }
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (CDN, no build needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── DATA ─────────────────────────────────────────────────────────────────
    const DEFAULT_QUESTIONS = [
      { id:1,  type:"capital", country:"Fransiya",    answer:"Parij",    options:["London","Berlin","Parij","Madrid"],          fact:"Parij — «Nur shahri» deb ataladi." },
      { id:2,  type:"capital", country:"Yaponiya",    answer:"Tokio",    options:["Osaka","Tokio","Seul","Pekin"],               fact:"Tokio — dunyoning eng aholi zich shaharlaridan biri." },
      { id:3,  type:"flag",    country:"Germaniya",   answer:"Germaniya",flagEmoji:"🇩🇪", options:["Belgiya","Germaniya","Niderlandiya","Avstriya"], fact:"Germaniya bayrog'i qora, qizil va oltin ranglardan iborat." },
      { id:4,  type:"flag",    country:"Braziliya",   answer:"Braziliya",flagEmoji:"🇧🇷", options:["Argentina","Kolumbiya","Braziliya","Meksika"],   fact:"Braziliya bayrog'idagi yashil rang o'rmonlarni anglatadi." },
      { id:5,  type:"capital", country:"Avstraliya",  answer:"Kanberra", options:["Sidney","Melburn","Kanberra","Brisben"],       fact:"Ko'pchilik Sydneyni poytaxt deb o'ylaydi, lekin aslida Kanberra." },
      { id:6,  type:"map",     country:"Italiya",     answer:"Italiya",  mapHint:"🥾 Etik shaklidagi yarim orol", options:["Gretsiya","Ispaniya","Italiya","Portugaliya"], fact:"Italiya xaritada etikka o'xshaydi." },
      { id:7,  type:"capital", country:"Kanada",      answer:"Ottawa",   options:["Toronto","Vankuver","Monreal","Ottawa"],       fact:"Ottawa — Kanada poytaxti, Toronto emas." },
      { id:8,  type:"flag",    country:"Turkiya",     answer:"Turkiya",  flagEmoji:"🇹🇷", options:["Tunis","Pokiston","Turkiya","Ozarbayjon"],     fact:"Turkiya bayrog'idagi oy va yulduz Islom ramzlaridir." },
      { id:9,  type:"fact",    question:"Qaysi davlat eng ko'p mamlakatga chegaradosh?", answer:"Rossiya", options:["Xitoy","Rossiya","Braziliya","Germaniya"], fact:"Rossiya 14 ta davlat bilan chegaradosh." },
      { id:10, type:"capital", country:"O'zbekiston", answer:"Toshkent", options:["Samarqand","Buxoro","Toshkent","Namangan"],   fact:"Toshkent — Markaziy Osiyoning eng yirik shahri." },
      { id:11, type:"flag",    country:"Hindiston",   answer:"Hindiston",flagEmoji:"🇮🇳", options:["Bangladesh","Pokiston","Hindiston","Nepal"],    fact:"Hindiston bayrog'i o'rtasida Ashoka g'ildiragi tasvirlangan." },
      { id:12, type:"capital", country:"Braziliya",   answer:"Braziliya",options:["Rio de Janeyro","San-Paulu","Braziliya","Salvador"], fact:"Ko'pchilik Rio de Janeyro poytaxt deb o'ylaydi, lekin aslida Braziliya shahri." },
      { id:13, type:"fact",    question:"Qaysi davlatda eng ko'p til rasmiy til hisoblanadi?", answer:"Janubiy Afrika", options:["Hindiston","Janubiy Afrika","Belgiya","Shveytsariya"], fact:"Janubiy Afrikada 11 ta rasmiy til mavjud." },
      { id:14, type:"map",     country:"Norvegiya",   answer:"Norvegiya", mapHint:"🦌 Shimolda fjordlar mamlakati", options:["Shvetsiya","Finlandiya","Norvegiya","Daniya"], fact:"Norvegiyada 50,000 dan ortiq fjord mavjud." },
      { id:15, type:"capital", country:"Misr",        answer:"Qohira",   options:["Iskandariya","Qohira","Luxor","Asuon"],        fact:"Qohira — Afrika va Arab dunyosining eng yirik shahri." },
    ];

    const QUESTION_TIME = 15;
    const STORAGE_KEY = "geoquiz_questions_v2";

    function loadQuestions() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : DEFAULT_QUESTIONS;
      } catch { return DEFAULT_QUESTIONS; }
    }

    function saveQuestions(qs) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(qs)); } catch {}
    }

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    // ─── LANDING ──────────────────────────────────────────────────────────────
    function LandingScreen({ onStart, onAdmin }) {
      return (
        <div className="screen landing">
          <div className="globe-bg">
            <div className="globe-ring r1" />
            <div className="globe-ring r2" />
            <div className="globe-ring r3" />
          </div>
          <div className="landing-content">
            <div className="logo-area">
              <span className="logo-icon">🌍</span>
              <h1 className="logo-title">GeoQuiz</h1>
              <p className="logo-sub">Geografiyani o'rganishning eng qiziqarli usuli</p>
            </div>
            <div className="landing-card">
              <p className="landing-desc">Davlatlar, poytaxtlar, bayroqlar va xaritalar orqali bilimlaringizni sinab ko'ring.</p>
              <div className="features">
                <span>🏛️ Poytaxtlar</span>
                <span>🚩 Bayroqlar</span>
                <span>🗺️ Xaritalar</span>
                <span>💡 Faktlar</span>
              </div>
            </div>
            <div className="quiz-info-box">
              <p>🎯 Sizni <strong>10 ta savoldan</strong> iborat test kutmoqda</p>
              <p>⏱️ Har bir savolda <strong>{QUESTION_TIME} soniya</strong> vaqt mavjud</p>
              <p>⚡ Tez va to'g'ri javob — <strong>yuqori ball!</strong></p>
            </div>
            <button className="cta-btn" onClick={onStart}>🚀 Testni boshlash</button>
            <button className="admin-link-btn" onClick={onAdmin}>⚙️ Admin panel</button>
          </div>
        </div>
      );
    }

    // ─── TIMER RING ───────────────────────────────────────────────────────────
    function TimerRing({ timeLeft, total }) {
      const pct = timeLeft / total;
      const r = 22, circ = 2 * Math.PI * r;
      const color = timeLeft <= 5 ? "#ff4d6d" : timeLeft <= 10 ? "#ffd166" : "#06d6a0";
      return (
        <div className="timer-ring-wrap">
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="4"/>
            <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="4"
              strokeDasharray={`${circ * pct} ${circ}`} strokeLinecap="round"
              transform="rotate(-90 30 30)" style={{transition:"stroke-dasharray 0.9s linear,stroke 0.3s"}}/>
          </svg>
          <span className="timer-num" style={{color}}>{timeLeft}</span>
        </div>
      );
    }

    // ─── QUIZ SCREEN ──────────────────────────────────────────────────────────
    function QuizScreen({ questions, onFinish }) {
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(QUESTION_TIME);
      const [showFact, setShowFact] = useState(false);
      const [answers, setAnswers] = useState([]);
      const timerRef = useRef(null);
      const q = questions[idx];

      useEffect(() => { setSelected(null); setShowFact(false); setTimeLeft(QUESTION_TIME); }, [idx]);

      useEffect(() => {
        if (selected !== null) return;
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) { clearInterval(timerRef.current); handleAnswer(null); return 0; }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [idx, selected]);

      function handleAnswer(opt) {
        if (selected !== null) return;
        clearInterval(timerRef.current);
        setSelected(opt);
        const correct = opt === q.answer;
        if (correct) setScore(s => s + (timeLeft > 10 ? 3 : timeLeft > 5 ? 2 : 1));
        setAnswers(a => [...a, { q, chosen: opt, correct }]);
        setShowFact(true);
      }

      function next() {
        const pts = selected === q.answer ? (timeLeft > 10 ? 3 : timeLeft > 5 ? 2 : 1) : 0;
        if (idx + 1 >= questions.length) onFinish(score + (answers.find(a=>a.q.id===q.id) ? 0 : pts), [...answers]);
        else setIdx(i => i + 1);
      }

      const optClass = opt => {
        if (selected === null) return "opt";
        if (opt === q.answer) return "opt correct";
        if (opt === selected) return "opt wrong";
        return "opt dim";
      };

      const QBody = () => {
        if (q.type === "capital") return <div className="q-body"><div className="q-type-tag">🏛️ Poytaxt</div><div className="q-main">{q.country}ning poytaxti qaysi?</div></div>;
        if (q.type === "flag")    return <div className="q-body"><div className="q-type-tag">🚩 Bayroq</div><div className="flag-display">{q.flagEmoji}</div><div className="q-main">Bu bayroq qaysi davlatga tegishli?</div></div>;
        if (q.type === "map")     return <div className="q-body"><div className="q-type-tag">🗺️ Xarita</div><div className="map-hint-box">{q.mapHint}</div><div className="q-main">Xaritada ko'rsatilgan hudud qaysi davlat?</div></div>;
        if (q.type === "fact")    return <div className="q-body"><div className="q-type-tag">💡 Fakt savol</div><div className="q-main">{q.question}</div></div>;
        return null;
      };

      return (
        <div className="screen quiz">
          <div className="quiz-header">
            <div className="progress-area">
              <div className="progress-bar"><div className="progress-fill" style={{width:`${((idx+1)/questions.length)*100}%`}}/></div>
              <span className="progress-label">{idx+1} / {questions.length}</span>
            </div>
            <TimerRing timeLeft={timeLeft} total={QUESTION_TIME}/>
            <div className="score-badge">⭐ {score}</div>
          </div>
          <div className={`quiz-card${selected!==null?(selected===q.answer?" card-correct":" card-wrong"):""}`}>
            <QBody/>
            <div className="options-grid">
              {q.options.map(opt => (
                <button key={opt} className={optClass(opt)} onClick={() => handleAnswer(opt)} disabled={selected !== null}>
                  {opt === q.answer && selected !== null ? "✅ " : opt === selected && selected !== q.answer ? "❌ " : ""}{opt}
                </button>
              ))}
            </div>
            {showFact && <div className="fact-box"><span className="fact-icon">💡</span><span>{q.fact}</span></div>}
            {selected !== null && <button className="next-btn" onClick={next}>{idx+1 >= questions.length ? "🏆 Natijani ko'rish" : "Keyingisi →"}</button>}
          </div>
        </div>
      );
    }

    // ─── RESULT SCREEN ────────────────────────────────────────────────────────
    function ResultScreen({ score, answers, total, onRestart, onAdmin }) {
      const maxScore = total * 3;
      const pct = Math.round((score / maxScore) * 100);
      const correct = answers.filter(a => a.correct).length;
      const [tier, emoji, msg] = pct >= 70
        ? ["good","🎉","Ajoyib! Siz geografiyani yaxshi bilasiz!"]
        : pct >= 40
        ? ["mid","👍","Yomon emas, yana mashq qiling!"]
        : ["low","📚","Ko'proq o'rganish kerak!"];
      return (
        <div className="screen result">
          <div className={`result-card tier-${tier}`}>
            <div className="result-emoji">{emoji}</div>
            <div className="result-msg">{msg}</div>
            <div className="result-stats">
              <div className="stat"><span className="stat-val">{correct}</span><span className="stat-label">To'g'ri</span></div>
              <div className="stat"><span className="stat-val">{total-correct}</span><span className="stat-label">Noto'g'ri</span></div>
              <div className="stat"><span className="stat-val">{score}</span><span className="stat-label">Ball</span></div>
            </div>
            <div className="score-pct-bar"><div className="score-pct-fill" style={{width:`${pct}%`}}/></div>
            <p className="score-pct-label">{pct}% natija</p>
            <div className="answers-review">
              {answers.map((a,i) => (
                <div key={i} className={`review-row ${a.correct?"rev-ok":"rev-fail"}`}>
                  <span>{a.correct?"✅":"❌"}</span>
                  <span className="rev-q">{a.q.type==="fact"?a.q.question:a.q.type==="capital"?`${a.q.country} poytaxti`:`${a.q.country} bayrog'i`}</span>
                  <span className="rev-ans">{a.q.answer}</span>
                </div>
              ))}
            </div>
            <button className="cta-btn" onClick={onRestart}>🔄 Qayta boshlash</button>
            <button className="admin-btn-sm" onClick={onAdmin}>⚙️ Admin panel</button>
          </div>
        </div>
      );
    }

    // ─── ADMIN PANEL ──────────────────────────────────────────────────────────
    function AdminPanel({ questions, setQuestions, onClose }) {
      const [tab, setTab] = useState("list");
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState(null);
      const [pw, setPw] = useState("");
      const [auth, setAuth] = useState(false);
      const PASS = "geo123";

      function tryLogin() {
        if (pw === PASS) setAuth(true);
      }

      if (!auth) return (
        <div className="admin-overlay">
          <div className="admin-login">
            <div className="login-icon">🔐</div>
            <h2>Admin kirish</h2>
            <input type="password" placeholder="Parol..." value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={e => e.key==="Enter" && tryLogin()} />
            <div className="admin-login-btns">
              <button className="cta-btn" onClick={tryLogin}>Kirish</button>
              <button className="admin-btn-sm" onClick={onClose}>Bekor</button>
            </div>
            {pw && pw !== PASS && <p className="err-txt">Noto'g'ri parol</p>}
            <p className="hint-txt">Demo parol: <code>geo123</code></p>
          </div>
        </div>
      );

      function startEdit(q) { setEditing(q.id); setForm({...q, optStr: q.options.join("|")}); setTab("edit"); }
      function startNew() {
        setEditing("new");
        setForm({id:Date.now(), type:"capital", country:"", answer:"", options:[], optStr:"|||", fact:"", question:"", flagEmoji:"", mapHint:""});
        setTab("edit");
      }
      function saveForm() {
        const opts = form.optStr.split("|").map(s=>s.trim()).filter(Boolean);
        if (opts.length < 2) return alert("Kamida 2 ta variant kiriting (| bilan ajrating)");
        if (!form.answer.trim()) return alert("To'g'ri javobni kiriting");
        const saved = {...form, options: opts};
        delete saved.optStr;
        const updated = editing === "new"
          ? [...questions, saved]
          : questions.map(q => q.id === editing ? saved : q);
        setQuestions(updated);
        saveQuestions(updated);
        setTab("list"); setEditing(null); setForm(null);
      }
      function deleteQ(id) {
        if (!confirm("O'chirishni tasdiqlaysizmi?")) return;
        const updated = questions.filter(q => q.id !== id);
        setQuestions(updated); saveQuestions(updated);
      }
      function resetDefault() {
        if (!confirm("Barcha savollarni standart holatga qaytarishni tasdiqlaysizmi?")) return;
        setQuestions(DEFAULT_QUESTIONS); saveQuestions(DEFAULT_QUESTIONS);
      }

      const typeLabels = { capital:"🏛️ Poytaxt", flag:"🚩 Bayroq", map:"🗺️ Xarita", fact:"💡 Fakt" };

      return (
        <div className="admin-overlay">
          <div className="admin-panel">
            <div className="admin-header">
              <h2>⚙️ Admin Panel</h2>
              <div style={{display:"flex",gap:"0.5rem"}}>
                <button className="reset-btn" onClick={resetDefault} title="Standartga qaytarish">↺</button>
                <button className="close-btn" onClick={onClose}>✕</button>
              </div>
            </div>
            <div className="admin-tabs">
              <button className={tab==="list"?"atab active":"atab"} onClick={() => setTab("list")}>📋 Savollar ({questions.length})</button>
              <button className={tab==="edit"?"atab active":"atab"} onClick={() => editing ? setTab("edit") : startNew()}>
                {editing ? "✏️ Tahrirlash" : "➕ Yangi"}
              </button>
              <button className="atab" onClick={startNew}>➕ Yangi savol</button>
            </div>

            {tab === "list" && (
              <div className="admin-list">
                {questions.map((q,i) => (
                  <div key={q.id} className="admin-q-row">
                    <span className="q-num">#{i+1}</span>
                    <span className="q-type-badge">{typeLabels[q.type]}</span>
                    <span className="q-text">{q.type==="fact" ? q.question : q.country}</span>
                    <span className="q-answer">→ {q.answer}</span>
                    <div className="q-actions">
                      <button onClick={() => startEdit(q)}>✏️</button>
                      <button onClick={() => deleteQ(q.id)}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "edit" && form && (
              <div className="admin-form">
                <label>Savol turi</label>
                <select value={form.type} onChange={e => setForm(f => ({...f, type:e.target.value}))}>
                  <option value="capital">🏛️ Poytaxt</option>
                  <option value="flag">🚩 Bayroq</option>
                  <option value="map">🗺️ Xarita</option>
                  <option value="fact">💡 Fakt savol</option>
                </select>

                {form.type !== "fact" && <>
                  <label>Davlat nomi</label>
                  <input value={form.country||""} onChange={e => setForm(f=>({...f,country:e.target.value}))} placeholder="Masalan: Yaponiya"/>
                </>}
                {form.type === "fact" && <>
                  <label>Savol matni</label>
                  <input value={form.question||""} onChange={e => setForm(f=>({...f,question:e.target.value}))} placeholder="Savol..."/>
                </>}
                {form.type === "flag" && <>
                  <label>Bayroq emoji</label>
                  <input value={form.flagEmoji||""} onChange={e => setForm(f=>({...f,flagEmoji:e.target.value}))} placeholder="🇺🇿"/>
                </>}
                {form.type === "map" && <>
                  <label>Xarita maslahat matni</label>
                  <input value={form.mapHint||""} onChange={e => setForm(f=>({...f,mapHint:e.target.value}))} placeholder="🥾 Etik shakli..."/>
                </>}

                <label>To'g'ri javob</label>
                <input value={form.answer||""} onChange={e => setForm(f=>({...f,answer:e.target.value}))} placeholder="To'g'ri javob"/>

                <label>Variantlar (| bilan ajrating)</label>
                <input value={form.optStr||""} onChange={e => setForm(f=>({...f,optStr:e.target.value}))} placeholder="Tokio|Osaka|Seul|Pekin"/>

                <label>Fakt</label>
                <textarea value={form.fact||""} onChange={e => setForm(f=>({...f,fact:e.target.value}))} placeholder="Qiziqarli fakt..." rows="2"/>

                <div className="form-btns">
                  <button className="cta-btn" onClick={saveForm}>💾 Saqlash</button>
                  <button className="admin-btn-sm" onClick={() => {setTab("list");setEditing(null);setForm(null);}}>Bekor</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── APP ROOT ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("landing");
      const [questions, setQuestions] = useState(loadQuestions);
      const [quizQ, setQuizQ] = useState([]);
      const [result, setResult] = useState(null);
      const [showAdmin, setShowAdmin] = useState(false);

      function startQuiz() {
        setQuizQ(shuffle(questions).slice(0, Math.min(10, questions.length)));
        setScreen("quiz");
      }

      return (
        <div className="app">
          {screen === "landing" && <LandingScreen onStart={startQuiz} onAdmin={() => setShowAdmin(true)}/>}
          {screen === "quiz" && <QuizScreen questions={quizQ} onFinish={(s,a) => { setResult({score:s,answers:a}); setScreen("result"); }}/>}
          {screen === "result" && result && (
            <ResultScreen score={result.score} answers={result.answers} total={quizQ.length}
              onRestart={() => { setResult(null); setScreen("landing"); }}
              onAdmin={() => setShowAdmin(true)}/>
          )}
          {showAdmin && <AdminPanel questions={questions} setQuestions={setQuestions} onClose={() => setShowAdmin(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <!-- Inline CSS -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .app { min-height: 100vh; background: #080c14; font-family: 'DM Sans', sans-serif; color: #e8eaf0; overflow-x: hidden; }
    .screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; position: relative; }

    /* LANDING */
    .landing { background: radial-gradient(ellipse at 60% 20%, #0d2444 0%, #080c14 60%); }
    .globe-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .globe-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0,200,255,0.07); left: 50%; top: 50%; transform: translate(-50%,-50%); }
    .r1 { width: 380px; height: 380px; animation: pulse 4s ease-in-out infinite; }
    .r2 { width: 620px; height: 620px; animation: pulse 4s ease-in-out 1.3s infinite; }
    .r3 { width: 860px; height: 860px; animation: pulse 4s ease-in-out 2.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.65} }

    .landing-content { position: relative; z-index: 1; max-width: 460px; width: 100%; display: flex; flex-direction: column; gap: 1.25rem; }
    .logo-area { text-align: center; }
    .logo-icon { font-size: 3.5rem; display: block; animation: spin 25s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .admin-btn-sm { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.72rem; font-size: 0.92rem; color: #7fa3c4; cursor: pointer; text-align: center; transition: background .2s; font-family: 'DM Sans', sans-serif; width: 100%; }
